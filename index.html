  /* INÍCIO DO JAVASCRIPT */ <script> /* Seu JS original começa aqui — nada removido, apenas organizado */ /* === LOGIN === */ const pwdInput = document.getElementById("pwdInput"); const loginBtn = document.getElementById("loginBtn"); const loginErr = document.getElementById("loginErr"); let currentPwd = localStorage.getItem("pwd") || "1234"; loginBtn.onclick = () => { if (pwdInput.value === currentPwd) { document.getElementById("loginScreen").style.display = "none"; document.getElementById("app").style.display = "block"; } else { loginErr.style.display = "block"; setTimeout(() => loginErr.style.display = "none", 2000); } }; /* === CONFIG DO LOGIN === */ document.getElementById("ctog").onclick = () => { const panel = document.getElementById("cpanel"); panel.style.display = panel.style.display === "block" ? "none" : "block"; }; document.getElementById("cfgBtn").onclick = () => { const admin = document.getElementById("cfgAdmin").value; const newPwd = document.getElementById("cfgPwd").value; if (admin === "admin2024" && newPwd.length > 0) { localStorage.setItem("pwd", newPwd); currentPwd = newPwd; document.getElementById("cfgStatus").innerText = "✔ Guardado!"; setTimeout(() => document.getElementById("cfgStatus").innerText = "", 1500); } }; /* === HEADER === */ function updateHeaderDate() { const now = new Date(); const options = { day: "numeric", month: "long" }; document.getElementById("headerDate").innerText = now.toLocaleDateString("es-AR", options); } updateHeaderDate(); /* === TABS === */ function switchTab(tab) { document.getElementById("tabHoy").classList.remove("active"); document.getElementById("tabSemana").classList.remove("active"); document.getElementById("tabMes").classList.remove("active"); if (tab === "hoy") document.getElementById("tabHoy").classList.add("active"); if (tab === "semana") document.getElementById("tabSemana").classList.add("active"); if (tab === "mes") document.getElementById("tabMes").classList.add("active"); loadData(tab); } /* === FAB / QUICK PANEL === */ const quickOverlay = document.getElementById("quickOverlay"); const quickPanel = document.getElementById("quickPanel"); document.getElementById("btnFAB").onclick = openQuick; function openQuick() { quickOverlay.style.display = "block"; setTimeout(() => quickPanel.style.bottom = "0", 10); } function closeQuick() { quickPanel.style.bottom = "-420px"; setTimeout(() => quickOverlay.style.display = "none", 300); } /* === QUICK SAVE === */ function saveQuick() { const client = document.getElementById("qClient").value.trim(); const amount = Number(document.getElementById("qAmount").value); const date = document.getElementById("qDate").value; const isCom = document.getElementById("qComision").checked; if (!client || !amount || !date) return; const entry = { client, amount, date, comision: isCom }; const data = JSON.parse(localStorage.getItem("agenda") || "[]"); data.push(entry); localStorage.setItem("agenda", JSON.stringify(data)); showQuickToast(client, amount); closeQuick(); } function showQuickToast(client, amount) { const toast = document.getElementById("quickToast"); const body = document.getElementById("quickToastBody"); body.innerText = `${client} — $${amount}`; toast.style.display = "block"; setTimeout(() => toast.style.display = "none", 2200); } /* === LISTAGEM === */ function loadData(tab) { const list = document.getElementById("mainWrap"); const data = JSON.parse(localStorage.getItem("agenda") || "[]"); list.innerHTML = ""; data.forEach(d => { const card = document.createElement("div"); card.className = "card"; card.innerHTML = ` <div class="card-top"> <div class="card-client">${d.client}</div> <div class="card-date">${d.date}</div> </div> <div class="card-amount">$${d.amount}</div> `; list.appendChild(card); }); } loadData("hoy");

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        /* === PRINT OVERLAY === */ function openPrintOverlay(html) { document.getElementById("printBody").innerHTML = html; document.getElementById("printOverlay").style.display = "flex"; } function closePrintOverlay() { document.getElementById("printOverlay").style.display = "none"; } function doPrint() { window.print(); } /* === INSTALAÇÃO PWA === */ let deferredPrompt; window.addEventListener("beforeinstallprompt", (e) => { e.preventDefault(); deferredPrompt = e; const installBtn = document.getElementById("installBtn"); if (installBtn) installBtn.style.display = "block"; }); function installApp() { if (!deferredPrompt) return; deferredPrompt.prompt(); deferredPrompt = null; } /* === LOADING === */ window.addEventListener("load", function() { const L = document.getElementById("loading"); if (!L) return; L.style.opacity = "0"; setTimeout(() => L.style.display = "none", 400); }); </script> <!-- SERVICE WORKER --> <script> if ('serviceWorker' in
