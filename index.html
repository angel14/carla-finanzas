<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Carla Scherer - Finanzas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Loading -->
  <div id="loading">
    <img src="icons/icon-512.png" id="logo" alt="Logo">
    <div id="coracao">♥</div>
  </div>

  <!-- Login -->
  <div id="loginScreen">
    <div class="login-card">
      <div class="logo-text">CS</div>
      <div class="login-brand">Carla Scherer</div>
      <div class="login-sub">Finanzas</div>
      <label class="login-label">Contraseña</label>

      <input
        type="password"
        id="pwdInput"
        class="login-input"
        placeholder="••••••"
      >

      <button id="loginBtn" class="login-btn">Ingresar</button>
      <div id="loginErr" class="login-err">Contraseña incorrecta</div>

      <div id="ctog" class="login-cfg">Configuración</div>

      <div id="cpanel" class="cfg-panel">
        <input
          type="password"
          id="cfgAdmin"
          class="cfg-input"
          placeholder="Contraseña admin"
        >

        <input
          type="password"
          id="cfgPwd"
          class="cfg-input"
          placeholder="Nueva contraseña"
        >

        <button id="cfgBtn" class="cfg-btn">Guardar cambios</button>
        <div id="cfgStatus" class="cfg-status"></div>
      </div>
    </div>
  </div>

  <!-- App -->
  <div id="app">
    <div class="header">
      <div class="header-inner">
        <div class="header-cs">CS</div>
        <div class="header-brand">Carla Scherer</div>
        <div id="headerDate" class="header-date"></div>
        <button id="btnSettings" class="header-cfg-btn">Ajustes</button>
      </div>
    </div>

    <div id="settingsPanel" class="settings-panel"></div>

    <div class="wrap">
      <div class="tabs">
        <button class="tab active" id="tabHoy" onclick="switchTab('hoy')">Hoy</button>
        <button class="tab" id="tabSemana" onclick="switchTab('semana')">Semana</button>
        <button class="tab" id="tabMes" onclick="switchTab('mes')">Mes</button>
      </div>

      <div id="mainWrap"></div>
    </div>
  </div>

  <!-- Quick Panel -->
  <div id="quickOverlay" class="quick-overlay" onclick="closeQuick()"></div>

  <div id="quickPanel" class="quick-panel">
    <div class="quick-panel-header">
      <div class="quick-panel-title">Cobro Rápido</div>
      <button class="quick-close" onclick="closeQuick()">×</button>
    </div>

    <div class="quick-field">
      <label class="quick-field-label">Cliente</label>
      <input id="qClient" class="quick-input" type="text">
    </div>

    <div class="quick-field">
      <label class="quick-field-label">Monto</label>
      <input id="qAmount" class="quick-input" type="number" step="0.01">
    </div>

    <div class="quick-field">
      <label class="quick-field-label">Fecha</label>
      <input id="qDate" class="quick-input" type="date">
    </div>

    <label class="quick-comision">
      <input id="qComision" type="checkbox">
      Es comisión / gasto
    </label>

    <button class="quick-btn" onclick="saveQuick()">Agregar Cobro</button>
  </div>

  <!-- FAB -->
  <button id="btnFAB" class="fab">+</button>

  <!-- Scripts -->
  <script src="js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then(reg => console.log('Service Worker registrado com sucesso:', reg))
          .catch(err => console.error('Erro ao registrar Service Worker:', err));
      });
    }
  </script>

</body>
</html>
